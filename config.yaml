# ── Which models to actually run ──────────────────────────────
# Set to [] to run ALL models listed above (that are installed)
# Or list specific names from this filtered top-company list
selected_models: ["llama3.2-3b", "gemma3-27b", "phi4-14b", "qwen2.5-7b", "deepseek-r1-7b", "gpt-oss-20b", "gemini-3-flash-preview"]

# ── Datasets ──────────────────────────────────────────────────
datasets:
  - name: "halueval_qa"
    source: "hf"
    hf_path: "pminervini/HaluEval"
    hf_subset: "qa_samples"
    split: "data"
    max_samples: 50                              # Start small, scale up later
    context_col: "knowledge"
    question_col: "question"
    right_answer_col: "right_answer"
    hallucinated_answer_col: "hallucinated_answer"
 
  - name: "synthetic"
    source: "synthetic"
    max_samples: 50
# ── Detection Methods ─────────────────────────────────────────
detectors:
  llm_based:
    enabled: true
    threshold: 0.5

  semantic_similarity:
    enabled: true
    threshold: 0.35
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

  bert_stochastic:
    enabled: true
    threshold: 0.75
    n_samples: 5
    temperature: 1.0

  token_similarity:
    enabled: true
    bleu_threshold: 0.25
    intersection_threshold: 0.35
    rouge_threshold: 0.30

reducers:
  # No reduction - just ask the question directly.
  # This gives us the baseline hallucination scores to compare against.
  baseline:
    enabled: true
 
  # Retrieval-Augmented Generation
  # Provides the reference passage alongside the question
  rag:
    enabled: true
 
  # Constrained Decoding
  # Uses tight generation parameters to force conservative outputs
  constrained_decoding:
    enabled: true
    temperature: 0.1
    top_p: 0.3
    top_k: 5
 
  # Self-Verification
  # Generates answer, then asks model to verify it
  self_verification:
    enabled: true
 
  # ----- Phase 3: Novel method (to be implemented) -----
  # brier_calibration:
  #   enabled: false

# ── Benchmark settings ────────────────────────────────────────
benchmark:
  output_dir: "results"
  save_intermediate: true
  seed: 42
  request_timeout: 120

# ── Logging ───────────────────────────────────────────────────
logging:
  level: "INFO"
  save_logs: true
  log_file: "results/benchmark.log"
